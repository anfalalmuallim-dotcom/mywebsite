<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة خاصة جداً 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #fff5f6; background-image: radial-gradient(#fbc7d4 1.5px, transparent 1.5px); background-size: 18px 18px; color: #564447; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { background: white; padding: 40px 25px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center; border: 2px solid #ffe3e7; box-shadow: 0 15px 35px rgba(220, 160, 170, 0.15); }
        .welcome-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff5f6; z-index:9999; display:flex; justify-content:center; align-items:center; }
        .step { display: none; } .step.active { display: block; }
        .btn { background: linear-gradient(135deg, #fbc7d4, #ffb3c1); color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 80%; }
        .btn-outline { background: white; color: #bd7a8b; border: 2px solid #fbc7d4; margin-bottom: 10px; width: 100%; }
        .loader { border: 5px solid #fff0f2; border-top: 5px solid #dca0aa; border-radius: 50%; width: 65px; height: 65px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .reveal-main-title { font-size: 2.2rem; font-weight: 900; color: #dfb647; margin-bottom: 20px; }
        .grid-name-card { background: #fff9fa; border: 2px solid #fbc7d4; padding: 15px; border-radius: 20px; cursor: pointer; color: #bd7a8b; margin-top: 10px; font-weight: bold; }
        .inner-gold-box { border: 2px solid #dfb647; border-radius: 20px; padding: 20px; margin: 20px 0; background: #fffbfa; }
    </style>
</head>
<body>

    <audio id="myAudio" src="song.mp3" loop></audio>

    <div id="welcomeScreen" class="welcome-screen">
        <button class="btn" onclick="startExperience()">اضغطي هنا لبدء المفاجأة 🌸</button>
    </div>

    <div id="mainContainer" class="container">
        <div id="step1" class="step active">
            <h2>مفاجأة عيد الميلاد! 🎉</h2>
            <p>أهلاً بنات خالاتي! اختاروا التاريخ الصحيح:</p>
            <button class="btn btn-outline" onclick="alert('خطأ! حاولوا مرة ثانية')">15 - 6</button>
            <button class="btn btn-outline" onclick="nextStep(2)">29 - 5 (مايو)</button>
        </div>

        <div id="step2" class="step">
            <h2>سؤال السرعة 🤫</h2>
            <p>هل فطوم بتصيح من الفرحة؟</p>
            <button class="btn btn-outline" onclick="nextStep(3)">هيه أكيد!</button>
        </div>

        <div id="step3" class="step">
            <h2>الخطوة الأخيرة 📥</h2>
            <button class="btn" onclick="startLoading()">📥 تحميل الهدية</button>
        </div>

        <div id="stepLoading" class="step">
            <div class="loader"></div>
            <h3>جاري التفعيل...</h3>
        </div>

        <div id="stepReveal" class="step">
            <div class="reveal-main-title">أنا العروسة الجديدة! 👰🏻‍♀️</div>
            <button class="btn" onclick="nextStep('Gate')">استلام الدعوة ✉️</button>
        </div>

        <div id="stepGate" class="step">
            <h2>بوابة شقيقات العروس</h2>
            <div class="grid-name-card" onclick="openInvitation('فطوم رضي')">فطوم رضي 🌸</div>
            <div class="grid-name-card" onclick="openInvitation('فطوم معلم')">فطوم معلم 🌸</div>
        </div>

        <div id="stepInviteCard" class="step">
            <div class="inner-gold-box">
                <h3 id="namePlace"></h3>
                <p id="textPlace"></p>
            </div>
            <button class="btn btn-outline" onclick="location.reload()">🏠 العودة للرئيسية</button>
        </div>
    </div>

    <script>
        function startExperience() {
            var audio = document.getElementById("myAudio");
            audio.play(); // هني الآيفون بيقبل التشغيل غصبن عنه
            document.getElementById("welcomeScreen").style.display = "none";
        }

        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        function startLoading() {
            nextStep('Loading');
            setTimeout(() => {
                document.getElementById('mainContainer').classList.add('gold-border');
                nextStep('Reveal');
            }, 3000);
        }

        function openInvitation(name) {
            document.getElementById('namePlace').innerText = name;
            document.getElementById('textPlace').innerText = "هذا هو نص الدعوة الخاص بكِ..";
            nextStep('InviteCard');
        }
    </script>
</body>
</html>
