<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة خاصة جداً 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #fff5f6; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { background: white; padding: 40px 25px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center; border: 2px solid #ffe3e7; box-shadow: 0 15px 35px rgba(220, 160, 170, 0.15); transition: all 0.4s ease; }
        .gold-border { border: 3px solid #dfb647; }
        .step { display: none; }
        .step.active { display: block; }
        .btn { background: linear-gradient(135deg, #fbc7d4, #ffb3c1); color: white; border: none; padding: 14px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .screenshot-btn { background: #c19b27; color: white; border: none; padding: 16px 25px; font-size: 1.15rem; font-weight: 700; border-radius: 35px; cursor: pointer; width: 100%; }
        .loader { border: 5px solid #fff0f2; border-top: 5px solid #dca0aa; border-radius: 50%; width: 65px; height: 65px; animation: spin 1s linear infinite; margin: 40px auto 30px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .names-row-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .grid-name-card { background: #fff9fa; border: 2px solid #fbc7d4; padding: 16px 10px; border-radius: 20px; cursor: pointer; font-weight: 700; color: #bd7a8b; }
    </style>
</head>
<body>
    <div id="mainContainer" class="container">
        <!-- الخطوات 1، 2، 3 كما هي -->
        <div id="step1" class="step active">
            <h2>مفاجأة عيد الميلاد! 🎉</h2>
            <button class="btn" onclick="nextStep(2)">29 - 5 (مايو)</button>
        </div>
        <div id="step2" class="step">
            <h2>سؤال السرعة والأمان 🤫</h2>
            <button class="btn" onclick="nextStep(3)">المفاجأة بتصيحنا كلنا!</button>
        </div>
        <div id="step3" class="step">
            <h2>الخطوة الأخيرة 📥</h2>
            <button class="btn" onclick="startLoadingProcess()">📥 تحميل الهدية</button>
        </div>
        <div id="stepLoading" class="step">
            <div class="loader"></div>
            <h3>جاري التحميل...</h3>
        </div>

        <!-- الترتيب الجديد المطلوب -->
        <div id="stepReady" class="step">
            <h2>لحظة الحقيقة...</h2>
            <button class="btn" onclick="nextStep('Reveal')" onclick="playWeddingMusicAndGo()">Let's Go! 🚀</button>
        </div>

        <div id="stepReveal" class="step">
            <div class="reveal-main-title">أنا العروسة الجديدة! 👰🏻‍♀️✨</div>
            <button class="screenshot-btn">اضغطي لاستلام دعوتك ✉️✨</button>
        </div>

        <div id="stepGate" class="step">
            <h2>بوابة شقيقات العروس</h2>
            <div class="names-row-container">
                <div class="grid-name-card" onclick="openInvitation('فطوم رضي')">فطوم رضي 🌸</div>
                <!-- باقي الأسماء -->
            </div>
        </div>
    </div>

    <script>
        var globalAudio = document.createElement('audio');
        globalAudio.src = "song.mp3";
        globalAudio.loop = true;
        document.body.appendChild(globalAudio);

        function nextStep(stepName) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            let targetId = stepName.toString().startsWith('step') ? stepName : 'step' + stepName;
            document.getElementById(targetId).classList.add('active');
        }

        function startLoadingProcess() {
            nextStep('Loading');
            setTimeout(function() {
                document.getElementById('mainContainer').classList.add('gold-border');
                nextStep('Ready'); // الانتقال لصفحة Let's Go
            }, 3500); 
        }

        function playWeddingMusicAndGo() {
            globalAudio.play();
            nextStep('Gate'); // الانتقال للبوابة
        }
    </script>
</body>
</html>
